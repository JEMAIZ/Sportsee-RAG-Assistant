# docker-compose.yml
# Lance Redis local pour le cache sémantique SportSee
# Usage : docker-compose up -d

services:
  redis:
    image: redis:7-alpine
    container_name: sportsee-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: local
