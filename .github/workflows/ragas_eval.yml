# .github/workflows/ragas_eval.yml
name: RAGAS Evaluation

on:
  push:
    branches: [main]
    paths:
      - "agent.py"
      - "sql_tool.py"
      - "rag_tool.py"
      - "team_tool.py"
      - "evaluate_ragas.py"
      - "utils/**"
  pull_request:
    branches: [main]

jobs:
  ragas-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dépendances ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Base de données de test ──────────────────────────────────────────
      - name: Setup test database
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          python load_excel_to_db.py --excel-path inputs/regular_NBA.xlsx

      # ── 5. Évaluation RAGAS ─────────────────────────────────────────────────
      - name: Run RAGAS evaluation
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          RAGAS_THRESHOLD: "0.65"
        run: |
          python evaluate_ragas.py --mode baseline --ci

      # ── 6. Upload rapport ────────────────────────────────────────────────────
      - name: Upload RAGAS report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report-${{ github.sha }}
          path: |
            outputs/ragas_baseline.json
            outputs/ragas_baseline.txt
          retention-days: 30

      # ── 7. Commentaire PR ────────────────────────────────────────────────────
      - name: Comment PR with scores
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('outputs/ragas_baseline.txt', 'utf8');
              const lines  = report.split('\n').slice(-20).join('\n');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🏀 RAGAS Evaluation Results\n\`\`\`\n${lines}\n\`\`\``
              });
            } catch(e) {
              console.log('Report not found:', e.message);
            }
